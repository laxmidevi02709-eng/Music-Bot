services:
  - type: worker
    name: vc-music-bot
    env: python
    plan: free
    buildCommand: |
      apt-get update && apt-get install -y ffmpeg || true
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: python -m VCMusicBot
    envVars:
      - key: API_ID
        sync: false
      - key: API_HASH
        sync: false
      - key: BOT_TOKEN
        sync: false
      - key: SESSION_STRING
        sync: false
      - key: OWNER_ID
        sync: false
      - key: SUPPORT_URL
        sync: false
